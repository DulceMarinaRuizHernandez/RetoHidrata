services:
  - type: web
    name: hydroboost-app
    runtime: python3
    buildCommand: |
      pwd
      ls -la
      if [ -f requirements.txt ]; then
        pip install -r requirements.txt
      elif [ -f mi_proyecto_flet/requirements.txt ]; then
        pip install -r mi_proyecto_flet/requirements.txt
      else
        echo "ERROR: requirements.txt not found in root or mi_proyecto_flet/"
        ls -la
        exit 1
      fi
    startCommand: python app.py
    rootDir: .
    envVars:
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: FLET_WEB_PORT
        value: $PORT